# improve colors
# set -g default-terminal "screen-256color"
# set -g terminal-overrides ",xterm-256color:RGB"
set -g default-terminal "${TERM}"
set -sg terminal-overrides ",*:RGB"

# enable mouse resizing
set -g mouse on

# use system clipboard
set -g set-clipboard on

# start windows and panes starting with 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1 
set-option -g renumber-windows on

bind-key -r f run-shell "tmux neww ~/.local/scripts/tmux-sessionizer"
bind -r e split-window -h -c "#{pane_current_path}"
bind -r E split-window -v -c "#{pane_current_path}"

# set pane to full size
bind -r z resize-pane -Z

# vim bindings
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

bind-key -T copy-mode-vi "v" send -X begin-selection
bind-key -T copy-mode-vi "y" send -X copy-selection

unbind -T copy-mode-vi MouseDragEnd1Pane

# reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Define colors
ACTIVE_COLOR="#b4befe"
INACTIVE_COLOR="#6c7086"
TEXT_COLOR="#cdd6f4"
ACCENT_COLOR="#b4befe"

# Basic status bar setup
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100

# Pane borders
set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=$ACTIVE_COLOR"

# Window status format - using dots instead of asterisks
set -g window-status-format "#[fg=$INACTIVE_COLOR,bg=default] #I:#W "
set -g window-status-current-format "#[fg=$ACTIVE_COLOR,bg=default,bold] #I:#W "

# Status bar
set -g status-style bg=default,fg=default,bright
# set -g status-left ""
set -g status-left "#[fg=$ACCENT_COLOR,bold]   #S #[fg=$INACTIVE_COLOR]│ "
set -g status-right "#[fg=$ACCENT_COLOR] #[fg=$TEXT_COLOR]#([ #{pane_current_path} = $HOME ] && echo '~' || basename #{pane_current_path})"

# Window status separator
set -g window-status-separator ""
